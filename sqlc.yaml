version: "2"
sql:
  # SQLC Code Generation for the Auth Service Database
  - name: "auth"
    schema: "schema/auth/"
    queries: "schema/auth/"
    gen:
      go:
        package: "authdb"
        out: "internal/db/auth"
        emit_json_tags: true
        emit_interface: true
        emit_exact_table_names: false

  # SQLC Code Generation for the Usage Service Database
  - name: "usage"
    schema: "schema/usage/"
    queries: "schema/usage/"
    gen:
      go:
        package: "usagedb"
        out: "internal/db/usage"
        emit_json_tags: true
        emit_interface: true
        emit_exact_table_names: false

  # SQLC Code Generation for the Billing Service Database
  - name: "billing"
    schema: "schema/billing/"
    queries: "schema/billing/"
    gen:
      go:
        package: "billingdb"
        out: "internal/db/billing"
        emit_json_tags: true
        emit_interface: true
        emit_exact_table_names: false
